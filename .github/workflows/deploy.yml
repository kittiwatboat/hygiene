name: Deploy Laravel to DirectAdmin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DA_SSH_KEY }}" > ~/.ssh/directadmin_key
          chmod 600 ~/.ssh/directadmin_key
          ssh-keyscan -p ${{ secrets.DA_PORT }} ${{ secrets.DA_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Laravel backend via SSH
        run: |
          ssh -i ~/.ssh/directadmin_key -p ${{ secrets.DA_PORT }} ${{ secrets.DA_USERNAME }}@${{ secrets.DA_HOST }} '
            cd ~/domains/hygiene.boat.orangeworkshop.info/project &&
            git pull origin main &&
            composer install --no-dev --optimize-autoloader &&
            php artisan up &&
            php artisan migrate --force &&
            php artisan config:clear &&
            php artisan cache:clear &&
            php artisan route:clear &&
            php artisan view:clear &&
            php artisan config:cache &&
            php artisan route:cache &&
            php artisan view:cache
          '

      - name: Upload built assets to project/public/build
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/directadmin_key -p ${{ secrets.DA_PORT }}" \
            public/build/ \
            ${{ secrets.DA_USERNAME }}@${{ secrets.DA_HOST }}:~/domains/hygiene.boat.orangeworkshop.info/project/public/build/

      - name: Sync public folder to public_html
        run: |
          ssh -i ~/.ssh/directadmin_key -p ${{ secrets.DA_PORT }} ${{ secrets.DA_USERNAME }}@${{ secrets.DA_HOST }} '
            cd ~/domains/hygiene.boat.orangeworkshop.info &&
            rm -f public_html/index.html &&
            rsync -av --delete --exclude=index.php --exclude=storage project/public/ public_html/
          '
